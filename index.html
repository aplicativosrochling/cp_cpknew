<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Estudo de Capabilidade</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--s0:#ffffff;--s1:#f7f8fc;--s2:#eef0f7;--s3:#e3e6f0;--t0:#0f1623;--t1:#2d3655;--t2:#5a6280;--t3:#9099b8;--blue:#1a56db;--blue-l:#dbeafe;--fail:#dc2626;--fail-l:#fee2e2;--family:'Plus Jakarta Sans',sans-serif;--mono:'Geist Mono',monospace}*,*::before,*::after{box-sizing:border-box}html,body{height:100%;margin:0;padding:0}body{font-family:var(--family);font-size:14px;background-color:var(--s1);color:var(--t0);line-height:1.5}h1,h2,h3,h4,h5,h6,p,ul,ol,li{margin:0;padding:0}ul,ol{list-style:none}button,input,select,textarea{font:inherit;color:inherit}#authGate{display:flex;align-items:center;justify-content:center;width:100%;height:100vh;background:linear-gradient(135deg,var(--blue-l) 0%,var(--s2) 100%);flex-direction:column;gap:16px}#loginForm{background:var(--s0);border-radius:8px;padding:32px;box-shadow:0 4px 16px rgba(0,0,0,0.08);width:100%;max-width:360px}#loginForm h2{font-size:18px;font-weight:700;margin-bottom:24px}#loginForm input{width:100%;padding:8px 12px;margin-bottom:12px;border:1px solid var(--s3);border-radius:4px}#loginForm button{width:100%;padding:10px;background:var(--blue);color:var(--s0);border:none;border-radius:4px;font-weight:600;cursor:pointer}#loginForm button:hover{background:#0f46c0}.app{display:none;width:100vw;height:100vh;flex-direction:column}.topbar{background:var(--s0);border-bottom:1px solid var(--s2);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}#topbarLogoImg{height:36px;width:auto}.app-container{display:flex;flex:1;overflow:hidden}.sidebar{width:280px;background:var(--s1);border-right:1px solid var(--s2);overflow-y:auto;padding:16px;flex-shrink:0}.content{flex:1;display:flex;flex-direction:column;overflow:hidden}.main-view{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--s0)}.view-header{padding:20px;border-bottom:1px solid var(--s2);flex-shrink:0}.view-content{flex:1;overflow-y:auto;padding:20px}.studies-list{margin-top:16px}.study-item{padding:12px;background:var(--s0);border:1px solid var(--s3);border-radius:4px;margin-bottom:8px;cursor:pointer}.study-item.active{border-color:var(--blue);background:var(--blue-l)}.study-item-name{font-weight:600;font-size:13px}.form-group{margin-bottom:16px}.form-group label{display:block;font-weight:600;font-size:13px;margin-bottom:6px}.form-group input,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--s3);border-radius:4px;font-size:13px}.form-group textarea{resize:vertical;min-height:80px}.btn{padding:8px 16px;border:1px solid var(--s3);border-radius:4px;background:var(--s0);color:var(--t0);cursor:pointer;font-weight:600;font-size:13px}.btn.primary{background:var(--blue);color:var(--s0)}.btn.danger{color:var(--fail)}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000}.modal.open{display:flex}.modal-content{background:var(--s0);border-radius:8px;padding:32px;max-width:600px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.15);max-height:80vh;overflow-y:auto}.modal-footer{margin-top:24px;display:flex;gap:12px;justify-content:flex-end}.data-table{width:100%;border-collapse:collapse;font-size:13px}.data-table th{background:var(--s2);padding:10px;text-align:left;font-weight:600;border-bottom:2px solid var(--s3)}.data-table td{padding:10px;border-bottom:1px solid var(--s3)}
</style>
</head>
<body>

<div id="authGate">
  <form id="loginForm" onsubmit="handleLogin(event)">
    <h2>🔐 Acesso ao Sistema</h2>
    <input type="email" id="loginEmail" placeholder="Email" required />
    <input type="password" id="loginPassword" placeholder="Senha" required />
    <button type="submit">Entrar</button>
    <div id="loginError" style="color:var(--fail);font-size:12px;margin-top:8px;"></div>
  </form>
</div>

<div class="app" style="display:flex;">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:16px;flex:1;">
      <img id="topbarLogoImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect fill='%231a56db' width='48' height='48' rx='4'/%3E%3Ctext x='24' y='32' font-size='24' font-weight='bold' fill='white' text-anchor='middle'%3ECP%3C/text%3E%3C/svg%3E" alt="Logo" />
      <div>
        <h1 style="font-size:18px;margin:0;">Estudo de Capabilidade</h1>
        <span style="font-size:11px;color:var(--t3);">AIAG / ISO 22514</span>
      </div>
    </div>
    <span id="userBadge" style="font-size:12px;color:var(--t2);display:none;"></span>
    <button type="button" class="btn" onclick="handleLogout()" style="margin-left:20px;font-size:12px;">🚪 Sair</button>
  </div>

  <div class="app-container">
    <div class="sidebar">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="font-size:14px;font-weight:700;margin:0;">📋 Estudos</h2>
        <button type="button" class="btn" onclick="createNewStudy()" style="padding:4px 8px;">➕</button>
      </div>
      <div class="studies-list" id="studiesList"></div>
    </div>

    <div class="content">
      <div class="main-view">
        <div class="view-header">
          <h1 id="studyTitle" style="margin:0;">Selecione um estudo</h1>
        </div>
        <div class="view-content" id="viewContent">
          <p style="color:var(--t3);">Crie ou selecione um estudo na lista ao lado para começar.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="studyModal" class="modal">
  <div class="modal-content">
    <div style="font-size:18px;font-weight:700;margin-bottom:20px;">Editar Estudo</div>
    <div class="form-group">
      <label>Nome do Estudo</label>
      <input type="text" id="studyName" />
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea id="studyDescription"></textarea>
    </div>
    <div class="form-group">
      <label>LSL</label>
      <input type="number" id="studyLSL" step="0.01" />
    </div>
    <div class="form-group">
      <label>Nominal</label>
      <input type="number" id="studyNominal" step="0.01" />
    </div>
    <div class="form-group">
      <label>USL</label>
      <input type="number" id="studyUSL" step="0.01" />
    </div>
    <div class="form-group">
      <label>Medições (uma por linha)</label>
      <textarea id="studyMeasurements"></textarea>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn" onclick="closeStudyModal()">Cancelar</button>
      <button type="button" class="btn primary" onclick="saveStudyFromModal()">💾 Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
'use strict';

var SUPABASE_URL = 'https://jlabjdq8nflvydcfya.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsYWJqZHE4bmZsdnlkY2Z5YSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzA0MDY3ODAwLCJleHAiOjE4NjE3MzU4MDB9.z_u0C8xJx4rZJWzL-pCKA8SvPddHjd1bS2n_O9PrIbU';

var supabase = null;
var currentStudy = null;
var allStudies = [];

function $(id) { return document.getElementById(id); }

// Inicializar Supabase
function initSupabase() {
  if (!window.supabase) {
    setTimeout(initSupabase, 100);
    return;
  }
  
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  console.log('[DB] Supabase inicializado');
  
  // Monitorar autenticação AQUI DENTRO
  supabase.auth.onAuthStateChange(function(event, session) {
    var gate = $('authGate');
    var app = document.querySelector('.app');
    var badge = $('userBadge');

    if (session && session.user) {
      console.log('[AUTH] Logado:', session.user.email);
      gate.style.display = 'none';
      app.style.display = 'flex';
      badge.textContent = session.user.email;
      badge.style.display = '';
      setTimeout(window._dbInit, 100);
    } else {
      console.log('[AUTH] Deslogado');
      gate.style.display = 'flex';
      app.style.display = 'none';
      badge.style.display = 'none';
    }
  });
}

initSupabase();

// APIs
window.DB = {
  saveStudy: async function(study) {
    var { data: { session } } = await supabase.auth.getSession();
    if (!session?.user) throw new Error('Não autenticado');
    
    var { error } = await supabase.from('studies').upsert({
      id: study.id,
      data: study,
      user_id: session.user.id
    }, { onConflict: 'id' });
    
    if (error) throw error;
    console.log('[DB] Salvo:', study.id);
  },

  deleteStudy: async function(id) {
    var { error } = await supabase.from('studies').delete().eq('id', id);
    if (error) throw error;
    console.log('[DB] Deletado:', id);
  },

  getAll: async function() {
    var { data: { session } } = await supabase.auth.getSession();
    if (!session?.user) throw new Error('Não autenticado');
    
    var { data, error } = await supabase.from('studies').select('data').eq('user_id', session.user.id);
    if (error) throw error;
    
    var studies = (data || []).map(r => r.data);
    console.log('[DB] Recuperados:', studies.length);
    return studies;
  },

  listen: function(callback) {
    supabase.channel('schema-db-changes-studies')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'studies' }, async () => {
        var studies = await window.DB.getAll();
        callback(studies);
      })
      .subscribe(() => console.log('[DB] Realtime ativo'));
  }
};

window.AUTH = {
  login: async (email, pass) => {
    var { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    return data.user;
  },

  logout: async () => {
    var { error } = await supabase.auth.signOut();
    if (error) throw error;
  }
};

// UI
window.handleLogin = async function(e) {
  e.preventDefault();
  try {
    await window.AUTH.login($('loginEmail').value, $('loginPassword').value);
    $('loginError').textContent = '';
    $('loginForm').reset();
  } catch (err) {
    $('loginError').textContent = 'Erro: ' + err.message;
  }
};

window.handleLogout = async function() {
  if (!confirm('Sair?')) return;
  try {
    await window.AUTH.logout();
  } catch (err) {
    alert('Erro: ' + err.message);
  }
};

window.createNewStudy = function() {
  currentStudy = {
    id: 'study_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
    name: 'Novo Estudo',
    description: '',
    lsl: 0,
    nominal: 0,
    usl: 10,
    measurements: [],
    createdAt: new Date().toISOString()
  };
  openStudyModal();
};

window.openStudyModal = function() {
  $('studyName').value = currentStudy.name;
  $('studyDescription').value = currentStudy.description;
  $('studyLSL').value = currentStudy.lsl;
  $('studyNominal').value = currentStudy.nominal;
  $('studyUSL').value = currentStudy.usl;
  $('studyMeasurements').value = currentStudy.measurements.join('\n');
  $('studyModal').classList.add('open');
};

window.closeStudyModal = function() {
  $('studyModal').classList.remove('open');
};

window.saveStudyFromModal = async function() {
  try {
    currentStudy.name = $('studyName').value || 'Sem nome';
    currentStudy.description = $('studyDescription').value;
    currentStudy.lsl = parseFloat($('studyLSL').value) || 0;
    currentStudy.nominal = parseFloat($('studyNominal').value) || 0;
    currentStudy.usl = parseFloat($('studyUSL').value) || 10;
    currentStudy.measurements = $('studyMeasurements').value.split('\n').map(m => parseFloat(m)).filter(v => !isNaN(v));

    await window.DB.saveStudy(currentStudy);
    closeStudyModal();
    await loadStudies();
  } catch (err) {
    alert('Erro: ' + err.message);
  }
};

window.selectStudy = function(id) {
  var study = allStudies.find(s => s.id === id);
  if (study) {
    currentStudy = study;
    renderStudyView();
    updateStudiesList();
  }
};

window.deleteStudy = async function(id) {
  if (!confirm('Deletar?')) return;
  try {
    await window.DB.deleteStudy(id);
    if (currentStudy?.id === id) {
      currentStudy = null;
      renderStudyView();
    }
    await loadStudies();
  } catch (err) {
    alert('Erro: ' + err.message);
  }
};

function updateStudiesList() {
  var list = $('studiesList');
  list.innerHTML = '';
  allStudies.forEach(s => {
    var item = document.createElement('div');
    item.className = 'study-item' + (currentStudy?.id === s.id ? ' active' : '');
    item.onclick = () => selectStudy(s.id);
    item.innerHTML = '<div class="study-item-name">' + s.name + '</div>';
    list.appendChild(item);
  });
}

function renderStudyView() {
  if (!currentStudy) {
    $('studyTitle').textContent = 'Selecione um estudo';
    $('viewContent').innerHTML = '<p style="color:var(--t3);">Crie ou selecione um estudo.</p>';
    return;
  }

  $('studyTitle').textContent = currentStudy.name;

  var m = currentStudy.measurements || [];
  var n = m.length;
  var mean = n > 0 ? m.reduce((a, b) => a + b) / n : 0;
  var std = n > 0 ? Math.sqrt(m.reduce((a, v) => a + Math.pow(v - mean, 2), 0) / (n - 1 || 1)) : 0;
  var cpk = std > 0 ? Math.min((currentStudy.usl - mean) / (3 * std), (mean - currentStudy.lsl) / (3 * std)) : 0;

  $('viewContent').innerHTML = '<h2 style="margin:0 0 12px 0;">Resumo</h2>' +
    '<table class="data-table"><tr><td>N</td><td>' + n + '</td></tr>' +
    '<tr><td>Média</td><td>' + mean.toFixed(4) + '</td></tr>' +
    '<tr><td>Desvio</td><td>' + std.toFixed(4) + '</td></tr>' +
    '<tr><td>LSL</td><td>' + currentStudy.lsl + '</td></tr>' +
    '<tr><td>USL</td><td>' + currentStudy.usl + '</td></tr>' +
    '<tr><td>Cpk</td><td>' + cpk.toFixed(4) + '</td></tr></table>' +
    '<div style="display:flex;gap:12px;margin-top:24px;">' +
    '<button class="btn primary" onclick="openStudyModal()">✏️ Editar</button>' +
    '<button class="btn danger" onclick="deleteStudy(\'' + currentStudy.id + '\')">🗑️ Deletar</button></div>';
}

async function loadStudies() {
  try {
    allStudies = await window.DB.getAll();
    updateStudiesList();
    renderStudyView();
  } catch (err) {
    console.error('[APP] Erro:', err);
  }
}

window._dbInit = async function() {
  console.log('[APP] Inicializando...');
  try {
    await loadStudies();
    window.DB.listen(studies => {
      allStudies = studies;
      updateStudiesList();
      renderStudyView();
    });
    console.log('[APP] Pronto!');
  } catch (err) {
    console.error('[APP] Erro:', err);
  }
};
</script>

</body>
</html>
