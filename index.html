<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Acesso restrito</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#1e293b;padding:32px;border-radius:12px;width:100%;max-width:360px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  h1{margin:0 0 4px;font-size:20px}
  p{margin:0 0 20px;color:#94a3b8;font-size:14px}
  label{display:block;font-size:13px;margin:12px 0 6px}
  input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:14px;outline:none}
  input:focus{border-color:#3b82f6}
  button{margin-top:18px;width:100%;padding:10px;border:0;border-radius:8px;background:#3b82f6;color:#fff;font-weight:600;cursor:pointer;font-size:14px}
  button:disabled{opacity:.6;cursor:not-allowed}
  .err{color:#f87171;font-size:13px;margin-top:10px;min-height:18px}
  iframe{position:fixed;inset:0;width:100vw;height:100vh;border:0}
</style>
</head>
<body>
<div id="login" class="card">
  <h1>Acesso restrito</h1>
  <p>Entre com suas credenciais.</p>
  <form id="f">
    <label>Usuário</label>
    <input id="u" type="email" autocomplete="username" required>
    <label>Senha</label>
    <input id="p" type="password" autocomplete="current-password" required>
    <button id="b" type="submit">Entrar</button>
    <div class="err" id="e"></div>
  </form>
</div>

const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const f = document.getElementById('f');
const e = document.getElementById('e');
const b = document.getElementById('b');
f.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  e.textContent = '';
  b.disabled = true;
  b.textContent = 'Verificando...';
  try {
    const u = document.getElementById('u').value.trim();
    const p = document.getElementById('p').value;
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(u + ':' + p), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64d(SALT), iterations: 200000, hash: 'SHA-256' },
      baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64d(IV) }, key, b64d(CT));
    const html = new TextDecoder().decode(pt);
    document.body.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.srcdoc = html;
    document.body.appendChild(iframe);
  } catch (err) {
    e.textContent = 'Usuário ou senha inválidos';
    b.disabled = false;
    b.textContent = 'Entrar';
  }
});
</script>
