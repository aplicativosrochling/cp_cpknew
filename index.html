<script>
// ═══════════════════════════════════════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════════════════════════════════════
var SUPABASE_URL = 'https://ladbighqhfjxybydcfya.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhZGJpZ2hxaGZqeHlieWRjZnlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTYxNTgsImV4cCI6MjA5Njc3MjE1OH0._Fdr55VlHXunQIOx_dyVLienxuj2H_D_6IpKvT8Mfe0';

// ── Estado global ──
var _supabaseClient = null;
var _currentSession = null;
var _currentProfile = null;
var _currentPlant = null;
var _currentLanguage = 'pt-BR';
var i18nStrings = {};

// ═══════════════════════════════════════════════════════════════════════════════
// INICIALIZAÇÃO DO SUPABASE
// ═══════════════════════════════════════════════════════════════════════════════

window.i18nFallback = {
  'pt-BR': {
    'common.loading': 'Carregando…',
    'auth.email': 'E-mail',
    'auth.password': 'Senha',
    'auth.login': 'Entrar',
    'auth.logout': 'Sair',
    'auth.subtitle': 'Acesse o painel de controle',
    'admin.splash.title': 'Capability Study - Painel de Controle',
    'admin.splash.subtitle': 'Selecione uma planta para começar',
    'admin.panel.title': 'Gerenciamento de Plantas',
    'admin.panel.access': 'Acessar Planta',
    'admin.panel.newPlant': 'Nova Planta',
    'admin.panel.users': 'Acessos & Operadores',
    'dashboard.title': 'Dashboard de Capabilidade',
  },
  'es-MX': {
    'common.loading': 'Cargando…',
    'auth.email': 'Correo electrónico',
    'auth.password': 'Contraseña',
    'auth.login': 'Iniciar sesión',
    'auth.subtitle': 'Accede al panel de control',
  },
  'en-US': {
    'common.loading': 'Loading…',
    'auth.email': 'Email',
    'auth.password': 'Password',
    'auth.login': 'Sign In',
    'auth.subtitle': 'Access the control panel',
  },
  'de-DE': {
    'common.loading': 'Wird geladen…',
    'auth.email': 'E-Mail',
    'auth.password': 'Passwort',
    'auth.login': 'Anmelden',
    'auth.subtitle': 'Greifen Sie auf das Bedienfeld zu',
  }
};

function initSupabaseClient() {
  try {
    if (!window.supabase || !window.supabase.createClient) {
      console.log('[SB] ⏳ Aguardando Supabase...');
      setTimeout(initSupabaseClient, 200);
      return;
    }

    console.log('[SB] ✓ Inicializando Supabase...');

    var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        autoRefreshToken: true,
        persistSession: true,
        detectSessionInUrl: true
      }
    });

    _supabaseClient = supabaseClient;
    window._supabaseClient = supabaseClient;
    window.AUTH = {};

    // ═══════════════════════════════════════════════════════════════════
    // FUNÇÕES DE i18n
    // ═══════════════════════════════════════════════════════════════════

    async function loadTranslationsFromDatabase(languageCode) {
      try {
        console.log('[i18n] 🔎 Carregando:', languageCode);
        var { data, error } = await supabaseClient
          .from('translations')
          .select('key, value')
          .eq('language_code', languageCode);
        
        if (error) throw error;
        if (!data || data.length === 0) return false;
        
        var newStrings = {};
        data.forEach(function(row) {
          newStrings[row.key] = row.value;
        });
        i18nStrings = newStrings;
        _currentLanguage = languageCode;
        console.log('[i18n] ✓ Carregadas', Object.keys(i18nStrings).length, 'chaves');
        return true;
      } catch (e) { 
        console.warn('[i18n] ⚠️ Erro ao carregar:', e.message);
        return false; 
      }
    }

    window.applyI18n = async function(languageCode) {
      languageCode = languageCode || 'pt-BR';
      console.log('[i18n] 📍 Aplicando:', languageCode);
      var loaded = await loadTranslationsFromDatabase(languageCode);
      if (!loaded) {
        console.log('[i18n] Usando fallback');
        i18nStrings = window.i18nFallback[languageCode] || window.i18nFallback['pt-BR'];
      }
      document.documentElement.lang = languageCode;
      if (typeof applyI18nToDOM === 'function') applyI18nToDOM();
    };

    window.applyI18nToDOM = function() {
      var elements = document.querySelectorAll('[data-i18n]');
      elements.forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        var value = window.t(key);
        if (value && value !== key) {
          el.textContent = value;
        }
      });
    };

    window.t = function(key, fallback) {
      if (!key) return fallback || '';
      return i18nStrings[key] || fallback || key;
    };

    // ═══════════════════════════════════════════════════════════════════
    // FUNÇÕES DE AUTENTICAÇÃO
    // ═══════════════════════════════════════════════════════════════════

    async function fetchUserProfile(userId) {
      try {
        console.log('[SB] 🔎 Buscando perfil...');
        var { data, error } = await supabaseClient
          .from('profiles')
          .select('*, plants:plant_id(*)')
          .eq('id', userId)
          .maybeSingle();

        if (error) throw error;
        return data;
      } catch (e) { 
        console.warn('[SB] ⚠️ Erro ao buscar perfil:', e.message);
        return null; 
      }
    }

    async function fetchUserRoles(userId) {
      try {
        var { data, error } = await supabaseClient
          .from('user_roles')
          .select('role')
          .eq('user_id', userId);
        if (error) throw error;
        return (data || []).map(function(x){ return x.role; });
      } catch(e) {
        console.warn('[SB] ⚠️ Erro ao buscar roles:', e);
        return [];
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    // APLICAR UI DE AUTENTICAÇÃO
    // ═══════════════════════════════════════════════════════════════════

    async function applyAuthUI(session) {
      console.log('[Auth] Aplicando UI:', session ? 'COM SESSÃO' : 'SEM SESSÃO');
      
      var gate = document.getElementById('loginGate');
      var appEl = document.getElementById('app');
      var splash = document.getElementById('adminSplash');

      if (session) {
        console.log('[Auth] ✓ Sessão ativa para:', session.user.email);
        _currentSession = session;

        // Buscar perfil
        var profile = await fetchUserProfile(session.user.id);
        if (!profile) {
          console.warn('[Auth] ⚠️ Perfil não encontrado');
          profile = { 
            id: session.user.id,
            role: 'user', 
            plant_id: null,
            plants: { code: 'Padrão', language_code: 'pt-BR' } 
          };
        }

        // Buscar roles
        try {
          var roles = await fetchUserRoles(session.user.id);
          if (roles.indexOf('admin') >= 0) {
            profile.role = 'admin';
          }
          profile.roles = roles;
        } catch(e) { 
          console.warn('[Auth] Erro ao buscar roles:', e); 
        }

        _currentProfile = profile;
        _currentPlant = profile.plants || { code: 'Padrão', language_code: 'pt-BR' };

        // Carregar plant do localStorage se houver
        var savedPlantId = localStorage.getItem('selectedPlantId');
        if (savedPlantId) {
          try {
            var { data: savedPlant } = await supabaseClient
              .from('plants')
              .select('*')
              .eq('id', savedPlantId)
              .maybeSingle();
            if (savedPlant) _currentPlant = savedPlant;
          } catch(e) {
            console.warn('[Auth] Erro ao carregar plant salva:', e);
          }
        }

        // Expor globais
        window.currentPlant = _currentPlant;
        window.currentProfile = _currentProfile;

        console.log('[Auth] ✓ Perfil:', {
          email: session.user.email,
          role: _currentProfile.role,
          plant: _currentPlant.code
        });

        // Aplicar i18n
        try { 
          await window.applyI18n(_currentPlant.language_code || 'pt-BR'); 
        } catch(e) { console.warn('[Auth] Erro ao aplicar i18n:', e); }

        // Mostrar UI correta
        if (_currentProfile.role === 'admin' && !savedPlantId) {
          console.log('[Auth] ✓ Admin - Mostrando splash');
          if (splash) {
            splash.style.display = 'flex';
            splash.classList.remove('hidden');
            loadPlantsForSplash();
          }
        } else {
          console.log('[Auth] ✓ Mostrando app');
          if (gate) { gate.style.display = 'none'; gate.classList.add('hidden'); }
          if (appEl) { appEl.style.display = 'flex'; appEl.classList.remove('hidden'); }
          if (splash) splash.style.display = 'none';
        }

      } else {
        // SEM SESSÃO
        console.log('[Auth] ⚠️ Sem sessão - Mostrando login');
        _currentSession = null;
        _currentProfile = null;
        _currentPlant = null;

        if (gate) { gate.style.display = 'flex'; gate.classList.remove('hidden'); }
        if (appEl) { appEl.style.display = 'none'; appEl.classList.add('hidden'); }
        if (splash) splash.style.display = 'none';
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    // LOGIN / LOGOUT
    // ═══════════════════════════════════════════════════════════════════

    window.AUTH.login = async function(email, pass) {
      console.log('[Auth] 🔐 Tentando login...');
      var errEl = document.getElementById('loginError');
      
      try {
        if (!email || !pass) {
          errEl.textContent = 'Preencha todos os campos.';
          return false;
        }

        errEl.textContent = 'Entrando...';
        
        var { data, error } = await supabaseClient.auth.signInWithPassword({ 
          email: email, 
          password: pass 
        });

        if (error) {
          console.error('[Auth] ❌ Erro:', error.message);
          errEl.textContent = '❌ ' + (error.message || 'Erro ao entrar');
          return false;
        }

        if (!data.session) {
          console.error('[Auth] ❌ Sem sessão retornada');
          errEl.textContent = '❌ Erro: Sessão não foi criada';
          return false;
        }

        console.log('[Auth] ✓ Login sucesso!');
        errEl.textContent = '';
        
        // Aplicar UI IMEDIATAMENTE
        await applyAuthUI(data.session);
        return true;

      } catch(e) {
        console.error('[Auth] ❌ Exceção:', e);
        errEl.textContent = '❌ ' + (e.message || 'Erro desconhecido');
        return false;
      }
    };

    window.AUTH.logout = async function() {
      console.log('[Auth] 🚪 Saindo...');
      try {
        localStorage.removeItem('selectedPlantId');
        localStorage.removeItem('selectedPlantLanguage');
        localStorage.removeItem('selectedPlantCode');
        
        var { error } = await supabaseClient.auth.signOut();
        if (error) throw error;
        
        await applyAuthUI(null);
        console.log('[Auth] ✓ Logout sucesso');
      } catch(e) {
        console.error('[Auth] ❌ Erro ao fazer logout:', e);
      }
    };

    // ═══════════════════════════════════════════════════════════════════
    // SPLASH SCREEN PARA ADMIN
    // ═══════════════════════════════════════════════════════════════════

    async function loadPlantsForSplash() {
      try {
        var grid = document.getElementById('splashPlantGrid');
        if (!grid) return;

        var { data: plants, error } = await supabaseClient
          .from('plants')
          .select('*')
          .order('code');

        if (error || !plants || !plants.length) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">Nenhuma planta disponível</div>';
          return;
        }

        var FLAGS = {'pt-BR':'🇧🇷','es-MX':'🇲🇽','en-US':'🇺🇸','de-DE':'🇩🇪'};

        grid.innerHTML = plants.map(function(p) {
          var lang = p.language_code || 'pt-BR';
          return `
            <div class="splash-plant-card" onclick="window.selectPlantFromSplash('${p.id}', '${lang}')">
              <div class="splash-plant-flag">${FLAGS[lang] || '🌐'}</div>
              <h3>${escapeHtml(p.code)}</h3>
              <p>${escapeHtml(p.name)}</p>
              <div class="splash-plant-meta">
                <span>📍 ${escapeHtml(p.country || '—')}</span>
              </div>
              <div class="splash-plant-arrow">→</div>
            </div>
          `;
        }).join('');

      } catch(e) {
        console.error('[Splash] Erro:', e);
      }
    }

    window.selectPlantFromSplash = async function(plantId, langCode) {
      try {
        var { data: p } = await supabaseClient
          .from('plants')
          .select('*')
          .eq('id', plantId)
          .maybeSingle();

        if (!p) {
          alert('Planta não encontrada.');
          return;
        }

        localStorage.setItem('selectedPlantId', p.id);
        localStorage.setItem('selectedPlantLanguage', p.language_code || langCode || 'pt-BR');
        localStorage.setItem('selectedPlantCode', p.code);

        _currentPlant = p;
        window.currentPlant = p;

        if (typeof window.applyI18n === 'function') {
          await window.applyI18n(p.language_code || langCode || 'pt-BR');
        }

        var splash = document.getElementById('adminSplash');
        var gate = document.getElementById('loginGate');
        var appEl = document.getElementById('app');

        if (splash) splash.style.display = 'none';
        if (gate) { gate.style.display = 'none'; gate.classList.add('hidden'); }
        if (appEl) { appEl.style.display = 'flex'; appEl.classList.remove('hidden'); }

      } catch(e) {
        console.error('[Splash] Erro:', e);
      }
    };

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function(c) {
        return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;'}[c];
      });
    }

    // ═══════════════════════════════════════════════════════════════════
    // LISTENER DE AUTENTICAÇÃO
    // ═══════════════════════════════════════════════════════════════════

    console.log('[Auth] Registrando listener...');
    var unsubscribe = supabaseClient.auth.onAuthStateChange(async function(event, session) {
      console.log('[Auth] onAuthStateChange:', event);
      if (event === 'INITIAL_SESSION' || event === 'SIGNED_IN') {
        console.log('[Auth] ✓ Evento:', event, '→ Aplicando UI');
        await applyAuthUI(session);
      }
    });

    console.log('[SB] ✓ Supabase inicializado com sucesso!');

  } catch(e) {
    console.error('[SB] ❌ ERRO CRÍTICO:', e);
  }
}

// Iniciar quando document estiver pronto
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initSupabaseClient);
} else {
  initSupabaseClient();
}
</script>

  </div>
</div>

<!-- ════════════════════════════════════════════
     ADMIN SPLASH
     ════════════════════════════════════════════ -->
<div id="adminSplash">
  <div class="splash-container">
    <header class="splash-header">
      <h1>Röchling Automotive</h1>
      <p data-i18n="admin.splash.title">Capability Study - Painel de Controle</p>
      <p data-i18n="admin.splash.subtitle">Selecione uma planta para começar</p>
    </header>

    <div class="splash-plant-grid" id="splashPlantGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.5)" data-i18n="common.loading">Carregando…</div>

<!-- ════════════════════════════════════════════
     APP
     ════════════════════════════════════════════ -->
<div id="app">
  <div style="max-width:800px;margin:0 auto">
    <h2 data-i18n="dashboard.title">Dashboard de Capabilidade</h2>
    <p id="userBadge" style="color:#666;margin-top:10px;padding:10px;background:#e8eef7;border-radius:8px"></p>
    <button onclick="window.AUTH.logout()" style="margin-top:20px;padding:10px 20px;background:#dc2626;color:white;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600" data-i18n="auth.logout">Sair</button>
  </div>
</div>

<script>
// ── Função de Login ──
window.handleLogin = async function() {
  var email = document.getElementById('loginEmail').value.trim();
  var pass = document.getElementById('loginPassword').value;
  var btn = document.getElementById('loginBtn');
  
  btn.disabled = true;
  
  var success = await window.AUTH.login(email, pass);
  
  if (!success) {
    btn.disabled = false;
    document.getElementById('loginPassword').value = '';
  }
};

// ── Enter key no password ──
document.addEventListener('DOMContentLoaded', function() {
  var pass = document.getElementById('loginPassword');
  if (pass) {
    pass.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('loginBtn').click();
      }
    });
  }
  
  // Aplicar fallback i18n
  window.i18nStrings = window.i18nFallback['pt-BR'];
  if (typeof window.applyI18nToDOM === 'function') {
    window.applyI18nToDOM();
  }
});
</script>

</body>
</html>
